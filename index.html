const tg=window.Telegram?.WebApp;
if(tg){tg.expand();tg.ready();}

const MONTHS_RU=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const MONTHS_GEN=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const NOW=new Date();
const CY=NOW.getFullYear(),CM=NOW.getMonth(),CD=NOW.getDate();
let payments=[],paidMarks=[],editId=null,calY=CY,calM=CM;
let selectedMonths=3,extendId=null,extendAdd=3;

const MONTH_OPTIONS=[
  {v:1,label:'1 мес'},{v:2,label:'2 мес'},{v:3,label:'3 мес'},{v:6,label:'6 мес'},
  {v:12,label:'1 год'},{v:24,label:'2 года'},{v:0,label:'∞ всегда',special:true},
];

async function api(method,path,body){
  const res=await fetch(SUPABASE_URL+'/rest/v1/'+path,{
    method,
    headers:{
      'apikey':SUPABASE_KEY,
      'Authorization':'Bearer '+SUPABASE_KEY,
      'Content-Type':'application/json',
      'Prefer': method==='POST'?'return=representation':'',
    },
    body:body?JSON.stringify(body):undefined
  });
  if(!res.ok){const e=await res.text();throw new Error(e);}
  if(method==='DELETE'||res.status===204)return null;
  return res.json();
}

function setSyncStatus(state,text){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  dot.className='sync-dot'+(state==='loading'?' loading':state==='error'?' error':'');
  txt.textContent=text;
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

async function loadData(){
  try{
    setSyncStatus('loading','Загрузка...');
    const[p,pm]=await Promise.all([
      api('GET','payments?order=day.asc'),
      api('GET','paid_marks')
    ]);
    payments=p||[];
    paidMarks=pm||[];
    setSyncStatus('ok','Данные синхронизированы');
    render();
  }catch(e){
    setSyncStatus('error','Ошибка подключения');
    document.getElementById('home-list').innerHTML=`<div class="empty"><i class="ti ti-wifi-off"></i><div class="empty-title">Нет подключения</div><div class="empty-sub">Проверьте интернет и обновите</div></div>`;
  }
}

function isPaid(paymentId,y,m){
  return paidMarks.some(pm=>pm.payment_id===paymentId&&pm.year===y&&pm.month===m);
}

function isActiveInMonth(p,y,m){
  if(p.months===0)return true;
  const startIdx=p.start_year*12+p.start_month;
  const endIdx=startIdx+p.months-1;
  const curIdx=y*12+m;
  return curIdx>=startIdx&&curIdx<=endIdx;
}

function remainingMonths(p){
  if(p.months===0)return Infinity;
  const startIdx=p.start_year*12+p.start_month;
  const endIdx=startIdx+p.months-1;
  const curIdx=CY*12+CM;
  return endIdx-curIdx+1;
}

function status(p,y=CY,m=CM){
  if(!isActiveInMonth(p,y,m))return'inactive';
  if(isPaid(p.id,y,m))return'paid';
  if(y!==CY||m!==CM)return'upcoming';
  if(p.day<CD)return'overdue';
  if(p.day-CD<=7)return'soon';
  return'upcoming';
}

function repeatLabel(p){
  if(p.months===0)return'<span class="repeat-tag"><i class="ti ti-refresh" style="font-size:11px"></i> Бессрочно</span>';
  const rem=remainingMonths(p);
  if(rem<=0)return'<span class="repeat-tag" style="background:var(--red-bg);color:var(--red-text)"><i class="ti ti-calendar-off" style="font-size:11px"></i> Истёк</span>';
  return`<span class="repeat-tag"><i class="ti ti-refresh" style="font-size:11px"></i> Ещё ${rem} мес.</span>`;
}

function statusLabel(s){
  const map={overdue:'Просрочен',soon:'Скоро',upcoming:'Предстоит',paid:'Оплачено'};
  if(!map[s])return'';
  return`<span class="badge ${s}">${map[s]}</span>`;
}

function cardHTML(p,y=CY,m=CM){
  const s=status(p,y,m);
  if(s==='inactive')return'';
  const dim=new Date(y,m+1,0).getDate();
  const day=Math.min(p.day,dim);
  const checkLabel=s==='paid'?'<i class="ti ti-x" style="font-size:13px"></i> Снять':'<i class="ti ti-check" style="font-size:13px"></i> Оплачено';
  const checkClass=s==='paid'?'uncheck':'check';
  return`<div class="payment-card ${s}" id="card-${p.id}">
    <div class="day-circle ${s}">${day}</div>
    <div class="payment-info">
      <div class="payment-name">${p.name}</div>
      <div class="payment-meta">${p.category}${p.note?' · '+p.note:''}</div>
      ${repeatLabel(p)}
      <div class="action-row">
        <button class="action-btn ${checkClass}" onclick="togglePaid('${p.id}',${y},${m})">${checkLabel}</button>
        <button class="action-btn" onclick="openEdit('${p.id}')"><i class="ti ti-edit" style="font-size:13px"></i> Изменить</button>
        <button class="action-btn" onclick="openExtend('${p.id}')"><i class="ti ti-calendar-plus" style="font-size:13px"></i> Продлить</button>
        <button class="action-btn" onclick="duplicateP('${p.id}')"><i class="ti ti-copy" style="font-size:13px"></i> Дубль</button>
      </div>
    </div>
    <div class="payment-right">
      <div class="payment-amount">${Number(p.amount).toLocaleString('ru-RU')} р.</div>
      ${statusLabel(s)}
    </div>
  </div>`;
}

function render(){
  document.getElementById('header-month').textContent=MONTHS_RU[CM]+' '+CY;
  const active=payments.filter(p=>isActiveInMonth(p,CY,CM)).sort((a,b)=>a.day-b.day);
  const total=active.reduce((s,p)=>s+Number(p.amount),0);
  const paidN=active.filter(p=>isPaid(p.id,CY,CM)).length;
  const over=active.filter(p=>status(p)==='overdue').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat-card"><div class="stat-label">В месяц</div><div class="stat-value">${total.toLocaleString('ru-RU')} р.</div></div>
    <div class="stat-card"><div class="stat-label">Оплачено</div><div class="stat-value" style="color:var(--green)">${paidN}/${active.length}</div></div>
    <div class="stat-card"><div class="stat-label">Просрочено</div><div class="stat-value" style="color:${over?'var(--red)':'inherit'}">${over}</div></div>`;
  const listHTML=active.length?active.map(p=>cardHTML(p)).join(''):`<div class="empty"><i class="ti ti-receipt-2"></i><div class="empty-title">Нет платежей</div><div class="empty-sub">Нажмите «Добавить»</div></div>`;
  document.getElementById('home-list').innerHTML=listHTML;
  const allSorted=[...payments].sort((a,b)=>a.day-b.day);
  document.getElementById('all-list').innerHTML=allSorted.map(p=>cardHTML(p)).join('')||`<div class="empty"><i class="ti ti-receipt-2"></i><div class="empty-title">Нет платежей</div></div>`;
  renderCal();
}

function renderCal(){
  document.getElementById('cal-month-label').textContent=MONTHS_RU[calM]+' '+calY;
  const first=new Date(calY,calM,1).getDay();
  const shift=first===0?6:first-1;
  const dim=new Date(calY,calM+1,0).getDate();
  const byDay={};
  payments.filter(p=>isActiveInMonth(p,calY,calM)).forEach(p=>{
    const d=Math.min(p.day,dim);(byDay[d]=byDay[d]||[]).push(p);
  });
  let html='';
  for(let i=0;i<shift;i++)html+=`<div class="cal-cell"></div>`;
  for(let d=1;d<=dim;d++){
    const isToday=calY===CY&&calM===CM&&d===CD;
    const ps=byDay[d]||[];
    let dot='';
    if(ps.length){
      const ss=ps.map(p=>status(p,calY,calM));
      const pr=ss.includes('overdue')?'overdue':ss.includes('soon')?'soon':ss.includes('upcoming')?'upcoming':'paid';
      dot=`<span class="cal-dot dot-${pr}"></span>`;
    }
    html+=`<div class="cal-cell${isToday?' today':''}${ps.length?' has-pay':''}" onclick="${ps.length?`calDetail(${d})`:''}">${d}${dot}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function calDetail(day){
  const dim=new Date(calY,calM+1,0).getDate();
  const d=Math.min(day,dim);
  const ps=payments.filter(p=>isActiveInMonth(p,calY,calM)&&Math.min(p.day,dim)===d);
  if(!ps.length){document.getElementById('cal-detail').innerHTML='';return;}
  document.getElementById('cal-detail').innerHTML=`<div class="cal-detail-title">${day} числа</div><div class="payment-list">${ps.map(p=>cardHTML(p,calY,calM)).join('')}</div>`;
}

function calPrev(){calM--;if(calM<0){calM=11;calY--;}renderCal();document.getElementById('cal-detail').innerHTML='';}
function calNext(){calM++;if(calM>11){calM=0;calY++;}renderCal();document.getElementById('cal-detail').innerHTML='';}

function switchTab(t){
  ['home','list','calendar'].forEach(x=>{
    document.getElementById('tab-'+x).style.display=x===t?'':'none';
    document.getElementById('nav-'+x).classList.toggle('active',x===t);
  });
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['home','list','calendar'][i]===t));
}

function buildMonthsGrid(containerId,currentVal,onChange){
  const el=document.getElementById(containerId);
  el.innerHTML=MONTH_OPTIONS.map(o=>`
    <button class="month-chip${o.special?' special':''}${o.v===currentVal?' selected':''}"
      onclick="selectMonthChip('${containerId}',${o.v},this,'${onChange}')">${o.label}</button>
  `).join('');
}

function selectMonthChip(containerId,val,btn,onChange){
  document.querySelectorAll('#'+containerId+' .month-chip').forEach(c=>c.classList.remove('selected'));
  btn.classList.add('selected');
  if(onChange==='main'){selectedMonths=val;updateMonthsInfo();}
  else if(onChange==='extend'){extendAdd=val;updateExtendResult();}
}

function updateMonthsInfo(){
  const el=document.getElementById('months-info');if(!el)return;
  if(selectedMonths===0){el.textContent='Платёж будет отображаться каждый месяц без ограничений';return;}
  const end=new Date(CY,CM+selectedMonths-1,1);
  el.textContent=`С ${MONTHS_GEN[CM]} по ${MONTHS_GEN[end.getMonth()]} ${end.getFullYear()}`;
}

function openAdd(){
  editId=null;selectedMonths=3;
  document.getElementById('sheet-title').textContent='Новый платёж';
  ['f-name','f-amount','f-day','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-cat').value='Прочее';
  buildMonthsGrid('months-grid',3,'main');
  updateMonthsInfo();
  document.getElementById('sheet-btns').innerHTML=`<button class="sheet-btn cancel" onclick="closeSheet()">Отмена</button><button class="sheet-btn save" id="save-btn" onclick="saveP()">Сохранить</button>`;
  document.getElementById('sheet-bg').classList.add('open');
}

function openEdit(id){
  const p=payments.find(x=>x.id===id);if(!p)return;
  editId=id;selectedMonths=p.months;
  document.getElementById('sheet-title').textContent='Редактировать';
  document.getElementById('f-name').value=p.name;
  document.getElementById('f-amount').value=p.amount;
  document.getElementById('f-day').value=p.day;
  document.getElementById('f-cat').value=p.category;
  document.getElementById('f-note').value=p.note||'';
  buildMonthsGrid('months-grid',p.months,'main');
  updateMonthsInfo();
  document.getElementById('sheet-btns').innerHTML=`<button class="sheet-btn del" onclick="delP('${id}')">Удалить</button><button class="sheet-btn cancel" onclick="closeSheet()">Отмена</button><button class="sheet-btn save" id="save-btn" onclick="saveP()">Сохранить</button>`;
  document.getElementById('sheet-bg').classList.add('open');
}

function closeSheet(e){
  if(e&&e.target!==document.getElementById('sheet-bg'))return;
  document.getElementById('sheet-bg').classList.remove('open');
}

async function saveP(){
  const name=document.getElementById('f-name').value.trim();
  const amount=parseFloat(document.getElementById('f-amount').value);
  const day=parseInt(document.getElementById('f-day').value);
  const cat=document.getElementById('f-cat').value;
  const note=document.getElementById('f-note').value.trim();
  if(!name||isNaN(amount)||isNaN(day)||day<1||day>31){alert('Заполните название, сумму и день');return;}
  const btn=document.getElementById('save-btn');
  btn.disabled=true;btn.textContent='Сохраняем...';
  try{
    if(editId){
      await api('PATCH','payments?id=eq.'+editId,{name,amount,day,category:cat,note,months:selectedMonths});
      showToast('Платёж обновлён');
    } else {
      await api('POST','payments',[{name,amount,day,category:cat,note,start_year:CY,start_month:CM,months:selectedMonths}]);
      showToast('Платёж добавлен');
    }
    closeSheet();
    await loadData();
  }catch(e){
    alert('Ошибка сохранения. Проверьте интернет.');
    btn.disabled=false;btn.textContent='Сохранить';
  }
}

async function delP(id){
  if(!confirm('Удалить платёж?'))return;
  try{
    await api('DELETE','payments?id=eq.'+id);
    showToast('Платёж удалён');
    closeSheet();
    await loadData();
  }catch(e){alert('Ошибка удаления');}
}

async function togglePaid(id,y,m){
  const already=isPaid(id,y,m);
  try{
    if(already){
      await api('DELETE',`paid_marks?payment_id=eq.${id}&year=eq.${y}&month=eq.${m}`);
    } else {
      await api('POST','paid_marks',[{payment_id:id,year:y,month:m}]);
    }
    await loadData();
  }catch(e){alert('Ошибка. Проверьте интернет.');}
}

async function duplicateP(id){
  const p=payments.find(x=>x.id===id);if(!p)return;
  try{
    await api('POST','payments',[{name:p.name+' (копия)',amount:p.amount,day:p.day,category:p.category,note:p.note,start_year:CY,start_month:CM,months:p.months}]);
    showToast('Платёж продублирован');
    await loadData();
  }catch(e){alert('Ошибка дублирования');}
}

function openExtend(id){
  const p=payments.find(x=>x.id===id);if(!p)return;
  extendId=id;extendAdd=3;
  document.getElementById('extend-title').textContent='Продлить «'+p.name+'»';
  const rem=p.months===0?'бессрочно':`ещё ${remainingMonths(p)} мес.`;
  document.getElementById('extend-sub').textContent='Сейчас: '+rem;
  buildMonthsGrid('extend-months-grid',3,'extend');
  updateExtendResult();
  document.getElementById('extend-bg').classList.add('open');
}

function updateExtendResult(){
  const p=payments.find(x=>x.id===extendId);if(!p)return;
  if(p.months===0||extendAdd===0){
    document.getElementById('extend-result').textContent='Платёж и так бессрочный';
    document.getElementById('extend-progress').style.width='100%';return;
  }
  const newTotal=p.months+extendAdd;
  const endM=(p.start_month+newTotal-1)%12;
  const endY=p.start_year+Math.floor((p.start_month+newTotal-1)/12);
  document.getElementById('extend-result').textContent=`Будет действовать до ${MONTHS_GEN[endM]} ${endY} (итого ${newTotal} мес.)`;
  const pct=Math.min(100,Math.round((p.months/newTotal)*100));
  document.getElementById('extend-progress').style.width=pct+'%';
}

async function confirmExtend(){
  const p=payments.find(x=>x.id===extendId);if(!p)return;
  const btn=document.getElementById('extend-save-btn');
  btn.disabled=true;btn.textContent='Сохраняем...';
  try{
    const newMonths=p.months===0||extendAdd===0?0:p.months+extendAdd;
    await api('PATCH','payments?id=eq.'+extendId,{months:newMonths});
    showToast('Платёж продлён');
    closeExtend();
    await loadData();
  }catch(e){
    alert('Ошибка. Проверьте интернет.');
    btn.disabled=false;btn.textContent='Продлить';
  }
}

function closeExtend(e){
  if(e&&e.target!==document.getElementById('extend-bg'))return;
  document.getElementById('extend-bg').classList.remove('open');
}

loadData();
</script>


</body></html>
